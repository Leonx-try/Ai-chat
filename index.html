<!DOCTYPE html>
<html>
<head>
  <title>AI Chat</title>
</head>
<body>

  <h2>AI Chatbot 🤖</h2>
  <input id="m" placeholder="Type your message..." style="width:300px; padding:8px;">
  <button onclick="s()">Send</button>
  <p id="r"></p>

  <script>
    async function s() {
      let msg = document.getElementById("m").value;

      document.getElementById("r").innerText = "Loading...";

      try {
        let res = await fetch("http://localhost:4000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: msg })
        });

        let d = await res.json();
        document.getElementById("r").innerText = d.reply;

      } catch (err) {
        document.getElementById("r").innerText = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
